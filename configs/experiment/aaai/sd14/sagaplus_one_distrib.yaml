# @package _global_

defaults:
  - override /pipeline: sd14

task_name: ${pipeline.name}_sagaplus_one_distrib
pipeline:
  save_dir: "${paths.images_dir}/sd14/sagaplus_one_distrib/${data.dataset_path_or_url}"
  n_images: 16
  batch_size_pipeline: 16
  clip_start_index_for_syngen: 4

  distrib_config:
    _target_: src.models.gsn_config.DistribConfig
    criterion:
      _target_: src.models.gsn_criterion.iou.IOUGSN
      # you can add other params here for the criterion if needed
    step: 6
    optimizer_class: "SGD"
    max_opti: 50
    step_size: 20
    block: 0
    log_var: True
    per_channel: False
    batch_size_noise: 10
    init_mu: "x0_mean"
    rescale: true
    momentum_saga: 0.1
    one_image_per_distrib: false

  gsng_config:
    _target_: src.models.gsn_config.GsngConfig
    criterion:
      _target_: src.models.gsn_criterion.syngen.SynGen
      # you can add other params here for the criterion if needed
    scale_factor: 20
    scale_range: [1, 1]
    steps:
      _target_: src.models.utils.ListHydra
      start: ${pipeline.distrib_config.step}
      stop: 25

data:
  batch_size: 1 # x prompt per batch
  dataset_path_or_url: ${paths.dataset_dir}/2_entities
